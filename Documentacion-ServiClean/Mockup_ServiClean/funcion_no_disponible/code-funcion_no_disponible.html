<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-slate-50/80 dark:bg-slate-900/80 backdrop-blur-md docked full-width top-0 sticky z-50 flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-teal-600 dark:text-teal-400 hover:bg-teal-50/50 dark:hover:bg-teal-900/20 transition-colors scale-95 active:scale-90 transition-transform">

</button>
<h1 class="text-2xl font-extrabold text-teal-700 dark:text-teal-400 tracking-tighter">ServiClean</h1>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-high">

</div>

<main class="flex-grow flex flex-col items-center justify-center px-8 text-center mt-[-4rem]">
<!-- Feature Not Available Canvas -->
<div class="w-full max-w-sm flex flex-col items-center">
<!-- Editorial Illustration Container -->
<div class="relative w-64 h-64 mb-12 flex items-center justify-center">
<!-- Decorative Layered Shapes (The "Glass & Gradient" Rule) -->
<div class="absolute inset-0 bg-primary/5 rounded-full scale-110 blur-2xl"></div>
<div class="absolute w-48 h-48 bg-primary-fixed/30 rounded-[2.5rem] rotate-12"></div>
<!-- Main Visual -->
<div class="relative bg-surface-container-lowest shadow-[0_12px_32px_rgba(0,101,101,0.06)] p-8 rounded-[2rem] border border-outline-variant/20">
<span class="material-symbols-outlined text-primary text-[80px] leading-none" data-icon="construction">construction</span>
<!-- Pulse Indicator -->
<div class="absolute top-6 right-6 flex h-4 w-4">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
<span class="relative inline-flex rounded-full h-4 w-4 bg-primary"></span>
</div>
</div>
</div>
<!-- Typography Hierarchy (The Editorial Voice) -->
<h2 class="font-headline text-4xl font-extrabold text-on-surface tracking-tight mb-4">Función en camino</h2>
<p class="text-body-lg text-on-surface-variant leading-relaxed mb-12 max-w-[280px]">
                Estamos puliendo los últimos detalles para brindarte la mejor experiencia de limpieza profesional.
            </p>
<!-- Buttons (The "Soft-Touch" CTA) -->
<div class="w-full space-y-4">
<a class="editorial-gradient text-on-primary font-semibold py-4 px-8 rounded-full w-full inline-block shadow-lg shadow-primary/20 hover:brightness-110 transition-all active:scale-[0.98]" href="#">
                    Regresar al Inicio
                </a>
<div class="flex items-center justify-center gap-2 py-2">
<span class="material-symbols-outlined text-tertiary text-sm" data-icon="schedule">schedule</span>
<span class="text-[11px] font-manrope font-semibold uppercase tracking-wider text-tertiary">Disponible pronto</span>
</div>
</div>
</div>
<!-- Trust Badges (Material Chips) -->
</main>
