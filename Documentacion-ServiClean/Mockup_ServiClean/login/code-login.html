<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0px 12px 32px rgba(0, 101, 101, 0.06);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        /* Custom toggle animation */
        #role-switch-pill {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-option {
            transition: color 0.3s ease;
        }
    </style>
<style>
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex min-h-screen items-center justify-center p-6">
<!-- Main Container -->
<main class="w-full max-w-[1200px] grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
<!-- Left Column: Editorial Content (Visual Anchor) -->
<section class="hidden lg:flex flex-col space-y-8 pr-12">
<div class="relative w-full aspect-[4/5] rounded-[2rem] overflow-hidden editorial-shadow">
<img alt="Clean minimalist interior" class="w-full h-full object-cover" data-alt="Modern minimalist living room with white linen sofa, large windows, and soft natural morning light illuminating a dust-free environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDb739LAIYn9vR-bvf-OT_8ubPW_90QHVs65tWeeWQ6qLwEO1I6pk2cBvwj7TPx8FUYEmbbuJFXuwMR9w55h5tgF9gqHt7nZRO8ATTPmSCmDCqvYhZ4DEWAX1RquwywIt-6rH81Ccf0R61Mo_euzPY5Qg8f41Wjktw1_5xAtwYuuUSkDFeX4PoQolCDEk83ixsDatADorEq_yIYDNQfUs946ppa_5Red9sw_RXqO6X1jEWpQPEXhz4APWUCe7-5Zt0GwBuH0AoV2NU"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/40 to-transparent"></div>
<div class="absolute bottom-10 left-10 text-white max-w-sm">
<span class="text-xs font-label tracking-widest uppercase bg-white/20 backdrop-blur-md px-3 py-1 rounded-full mb-4 inline-block">Premium Hygiene</span>
<h2 class="text-4xl font-headline font-extrabold tracking-tight leading-tight">El arte de un espacio impecable.</h2>
</div>
</div>
</section>
<!-- Right Column: Login & Registration Card -->
<section class="flex flex-col items-center lg:items-start space-y-10">
<!-- Logo Header -->
<div class="flex flex-col items-center lg:items-start space-y-2">
<div class="flex items-center space-y-1">
<span class="text-4xl font-headline font-extrabold text-primary tracking-tighter">ServiClean</span>
</div>
<p class="text-on-surface-variant font-body leading-relaxed text-center lg:text-left">
                    Bienvenido de nuevo. Accede a tu cuenta para gestionar tus servicios.
                </p>
</div>
<!-- Auth Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-[2rem] p-8 editorial-shadow">
<!-- Role Toggle (Tabs as Switch) -->
<div class="bg-surface-container-low p-1.5 rounded-2xl flex mb-8 relative cursor-pointer" onclick="toggleRole()">
<!-- Sliding Pill Background -->
<div class="absolute top-1.5 left-1.5 w-[calc(50%-6px)] h-[calc(100%-12px)] bg-surface-container-lowest rounded-xl shadow-sm z-0" id="role-switch-pill"></div>
<button class="role-option flex-1 py-3 text-sm font-headline font-bold rounded-xl z-10 text-primary" id="btn-cliente" type="button">
                        Soy Cliente
                    </button>
<button class="role-option flex-1 py-3 text-sm font-headline font-semibold rounded-xl z-10 text-on-surface-variant" id="btn-colaborador" type="button">
                        Soy Colaborador
                    </button>
</div>
<script>
                    let currentRole = 'cliente';
                    function toggleRole() {
                        const pill = document.getElementById('role-switch-pill');
                        const btnCliente = document.getElementById('btn-cliente');
                        const btnColaborador = document.getElementById('btn-colaborador');
                        
                        if (currentRole === 'cliente') {
                            pill.style.transform = 'translateX(100%)';
                            pill.style.marginLeft = '3px';
                            btnCliente.classList.remove('text-primary', 'font-bold');
                            btnCliente.classList.add('text-on-surface-variant', 'font-semibold');
                            btnColaborador.classList.remove('text-on-surface-variant', 'font-semibold');
                            btnColaborador.classList.add('text-primary', 'font-bold');
                            currentRole = 'colaborador';
                        } else {
                            pill.style.transform = 'translateX(0%)';
                            pill.style.marginLeft = '0px';
                            btnColaborador.classList.remove('text-primary', 'font-bold');
                            btnColaborador.classList.add('text-on-surface-variant', 'font-semibold');
                            btnCliente.classList.remove('text-on-surface-variant', 'font-semibold');
                            btnCliente.classList.add('text-primary', 'font-bold');
                            currentRole = 'cliente';
                        }
                    }
                </script>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-[11px] font-label font-semibold uppercase tracking-wider text-outline px-1">Correo Electrónico</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-6 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all font-body text-on-surface placeholder:text-outline-variant" placeholder="nombre@ejemplo.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[11px] font-label font-semibold uppercase tracking-wider text-outline">Contraseña</label>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-2xl py-4 px-6 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all font-body text-on-surface placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
</div>
<div class="text-right mt-2">
<a class="text-xs font-body font-semibold text-secondary hover:underline transition-all" href="#">¿Olvidaste tu contraseña?</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-4 rounded-2xl font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all" type="submit">
                        Ingresar
                    </button>
</form>
<!-- Divider -->
<div class="flex items-center my-8">
<div class="flex-1 h-[1px] bg-surface-container-high"></div>
<span class="px-4 text-[11px] font-label font-bold text-outline uppercase tracking-widest">o continúa con</span>
<div class="flex-1 h-[1px] bg-surface-container-high"></div>
</div>
<!-- Social Access -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-3 border border-outline-variant/30 rounded-xl hover:bg-surface-container-low transition-colors">
<img alt="Google" class="w-5 h-5" data-alt="Official Google G logo icon with signature colors" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDYxpS1BmrpUUSx8k7Xj87cVg-hyGDztM58O27SxnldaRPfwLzufEelcxNHc4HmXXRtaIof3GQkZmexRA8FHLk1W-pyUjPP40FsqoDehgER8MBsrLo7feYjvgOKuu7H0ZNR59TAVlIWIoUfC_iEEwW4jgvK2xq5EL-U3zGmm1Gtn5xCgo2m8YegB8YuXXXNNet67Avw5DVr-Jz69kuqvp2tGXTvFNzDBdHPFqKSOUwsYiANxROS9InPCJhfCi_Ey222kYwfOOvwGJk"/>
<span class="text-sm font-headline font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center space-x-2 py-3 border border-outline-variant/30 rounded-xl hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-sm font-headline font-semibold text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Footer Link -->
<p class="font-body text-sm text-on-surface-variant">
                ¿Aún no tienes cuenta? <a class="text-primary font-bold hover:underline transition-all" href="#">Regístrate ahora</a>
</p>
<!-- Trust Badge -->
<div class="flex items-center space-x-4 pt-8 opacity-60">
<div class="flex items-center bg-tertiary-fixed px-3 py-1 rounded-full space-x-2">
<span class="material-symbols-outlined text-[14px] text-on-tertiary-fixed-variant" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-[10px] font-label font-bold uppercase tracking-tighter text-on-tertiary-fixed-variant">Servicio Seguro</span>
</div>
<div class="flex items-center bg-surface-container-high px-3 py-1 rounded-full space-x-2">
<span class="material-symbols-outlined text-[14px] text-primary" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="text-[10px] font-label font-bold uppercase tracking-tighter text-on-surface-variant">4.9/5 Rating</span>
</div>
</div>
</section>
</main>
<!-- Background Decorative Gradient (Breathable UI) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[5%] right-0 w-[30%] h-[30%] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
