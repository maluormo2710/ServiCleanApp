<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-variant": "#e1e3e4",
                    "primary-fixed": "#93f2f2",
                    "on-primary-fixed": "#002020",
                    "primary-container": "#008080",
                    "surface-tint": "#006a6a",
                    "surface-container": "#edeeef",
                    "surface-container-low": "#f3f4f5",
                    "on-tertiary-fixed": "#321300",
                    "on-secondary-fixed-variant": "#004493",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#e3fffe",
                    "tertiary": "#924400",
                    "tertiary-container": "#b85700",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#76d6d5",
                    "on-error": "#ffffff",
                    "outline-variant": "#bdc9c8",
                    "on-secondary": "#ffffff",
                    "on-tertiary-container": "#fff8f6",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f8f9fa",
                    "on-primary-fixed-variant": "#004f4f",
                    "tertiary-fixed-dim": "#ffb68a",
                    "surface": "#f8f9fa",
                    "inverse-surface": "#2e3132",
                    "error-container": "#ffdad6",
                    "surface-dim": "#d9dadb",
                    "inverse-on-surface": "#f0f1f2",
                    "outline": "#6e7979",
                    "tertiary-fixed": "#ffdbc8",
                    "secondary-container": "#0070ea",
                    "secondary-fixed": "#d8e2ff",
                    "on-surface": "#191c1d",
                    "secondary": "#0059bb",
                    "secondary-fixed-dim": "#adc7ff",
                    "inverse-primary": "#76d6d5",
                    "surface-container-high": "#e7e8e9",
                    "surface-container-highest": "#e1e3e4",
                    "on-secondary-fixed": "#001a41",
                    "on-surface-variant": "#3e4949",
                    "on-secondary-container": "#fefcff",
                    "background": "#f8f9fa",
                    "primary": "#006565",
                    "error": "#ba1a1a",
                    "on-tertiary": "#ffffff",
                    "on-background": "#191c1d",
                    "on-tertiary-fixed-variant": "#743500"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Manrope', sans-serif; }
        .glass-panel {
            background: rgba(248, 249, 250, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-50 bg-slate-50 dark:bg-slate-900 transition-colors duration-200">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined text-teal-600 dark:text-teal-400">arrow_back</span>
</button>
<h1 class="font-manrope font-bold text-lg tracking-tight text-teal-700 dark:text-teal-300 font-black tracking-tighter">Asistente ServiClean</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a friendly young professional man with a neat haircut against a soft blurred background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDlQXAvytBzT6M4qOasxC8rqFyHB-pxMCiFRhamuHD2ZnqjxBkoTBoKQzsXjdlU7da-cAbUqDxBYYHFUiWyzXH9TbqgqAyA23cdpT3sWlOVdmfMojGdRo39V0Eq9yYhQbZwIQfxjwoXtuNtlUN5Am_mIsH8tWMpxBgIWcXrmfEDBRMVcqR1S4VmLv9DmSe6FeQK4o7wITWXb540Lta9yjK8sk0oiWvFehmGseDe8CKYCkiw-F1uoDDgCCJ1JfAwSEBwoQ9Eir09GzA"/>
</div>
</div>
<div class="bg-slate-100 dark:bg-slate-800 h-px"></div>
</header>
<main class="flex-grow flex flex-col max-w-4xl mx-auto w-full px-4 pt-8 pb-32">
<!-- Chat Area -->
<div class="flex-grow flex flex-col space-y-10">
<!-- User Message -->
<div class="flex justify-end items-end gap-3 ml-12">
<div class="bg-primary-container text-on-primary-container px-6 py-4 rounded-t-3xl rounded-bl-3xl shadow-sm max-w-md">
<p class="font-body text-base leading-relaxed">Hola, necesito ayuda con mi reserva</p>
</div>
</div>
<!-- Bot Message -->
<div class="flex justify-start items-start gap-4 mr-12">
<div class="flex-shrink-0 mt-1">
<div class="w-10 h-10 rounded-2xl bg-primary flex items-center justify-center text-white shadow-md">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="bg-surface-container-lowest border-outline-variant/10 border-solid border px-6 py-4 rounded-t-3xl rounded-br-3xl shadow-[0px_4px_12px_rgba(0,101,101,0.04)] max-w-md">
<p class="font-body text-base leading-relaxed text-on-surface">¡Hola! Soy tu asistente virtual. ¿En qué puedo ayudarte hoy?</p>
</div>
<!-- Quick Actions / Chips -->
<div class="flex flex-wrap gap-2 mt-2">
<button class="bg-surface-container-low hover:bg-surface-container-high text-primary font-medium text-sm px-5 py-2.5 rounded-full transition-all border border-transparent hover:border-primary/20">
                            ¿Cómo cancelar?
                        </button>
<button class="bg-surface-container-low hover:bg-surface-container-high text-primary font-medium text-sm px-5 py-2.5 rounded-full transition-all border border-transparent hover:border-primary/20">
                            ¿Problemas con el pago?
                        </button>
<button class="bg-tertiary-fixed text-on-tertiary-fixed hover:bg-tertiary-fixed-dim font-medium text-sm px-5 py-2.5 rounded-full transition-all flex items-center gap-2">
<span class="material-symbols-outlined text-sm">support_agent</span>
                            Hablar con un humano
                        </button>
</div>
</div>
</div>
<!-- Status Indicator -->
<div class="flex items-center gap-2 px-14 py-2 opacity-60">
<div class="flex gap-1">
<span class="w-1.5 h-1.5 bg-teal-600 rounded-full animate-pulse"></span>
<span class="w-1.5 h-1.5 bg-teal-600 rounded-full animate-pulse delay-75"></span>
<span class="w-1.5 h-1.5 bg-teal-600 rounded-full animate-pulse delay-150"></span>
</div>
<span class="text-xs font-label uppercase tracking-widest text-outline">El asistente está escribiendo...</span>
</div>
</div>
</main>
<!-- Bottom Input & Navigation Shell -->
<div class="fixed bottom-0 left-0 w-full z-50">
<!-- Input Field Container -->
<div class="max-w-4xl mx-auto px-6 mb-2 text-center">
<p class="text-[11px] font-medium text-slate-400 dark:text-slate-500 uppercase tracking-widest">
        Por favor, no salgas del chat para mantener la conexión con el asistente
    </p>
</div><div class="max-w-4xl mx-auto px-4 pb-6">
<div class="bg-white/80 backdrop-blur-xl rounded-full shadow-[0px_12px_32px_rgba(0,101,101,0.12)] p-2 flex items-center gap-2">
<button class="p-3 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined">add_circle</span>
</button>
<input class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface font-body py-2 px-1" placeholder="Escribe un mensaje..." type="text"/>
<button class="bg-primary hover:bg-primary-container text-white p-3 rounded-full shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
<!-- BottomNavBar -->
</div>
<!-- Decorative Gradient Mesh for High-end feel -->
<div class="fixed top-0 right-0 -z-10 w-[500px] h-[500px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 left-0 -z-10 w-[300px] h-[300px] bg-secondary/5 rounded-full blur-[80px] pointer-events-none"></div>
</body></html>
